version: '3.8'

services:
  banana-gen-control-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banana-gen-control-panel
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    networks:
      - banana-gen-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  banana-gen-network:
    driver: bridge
