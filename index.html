<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banana Gen - Control Panel</title>
  <meta name="description" content="Control panel for managing image generation pipeline with Banana Gen AI" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <div id="app">
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo-section">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
          </div>
          <div>
            <h1 class="logo-title">Banana Gen</h1>
            <p class="logo-subtitle">Image Pipeline Control Panel</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="connection-status" id="connection-status">
            <span class="status-dot"></span>
            <span class="status-text">Connecting...</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Config Header Card -->
      <section class="config-header-card" id="config-header">
        <div class="config-header-grid">
          <div class="config-field">
            <label for="image-name" class="field-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              Tên Ảnh (Image Name)
            </label>
            <input type="text" id="image-name" class="field-input" placeholder="Nhập tên ảnh (VD: 26BB01)" />
            <div id="image-name-status" class="field-status" aria-live="polite"></div>
          </div>
          <div class="config-field">
            <label for="model-select" class="field-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 10 10H12V2z" />
                <path d="M20.88 12A10 10 0 0 0 12 2v10h8.88z" />
              </svg>
              Model
            </label>
            <select id="model-select" class="field-select">
              <option value="gemini-2.5-flash-image">Nano Banana (gemini-2.5-flash-image)</option>
              <option value="gemini-3.1-flash-image-preview">Nano Banana 2 (gemini-3.1-flash-image-preview)</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Pipeline Steps -->
      <section class="pipeline-section">
        <div class="pipeline-header">
          <h2 class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8" />
              <line x1="4" y1="20" x2="21" y2="3" />
              <polyline points="21 16 21 21 16 21" />
              <line x1="15" y1="15" x2="21" y2="21" />
              <line x1="4" y1="4" x2="9" y2="9" />
            </svg>
            Pipeline Steps
          </h2>
          <div class="pipeline-progress">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <span class="progress-text" id="progress-text">0/6 hoàn thành</span>
          </div>
        </div>

        <div class="pipeline-steps" id="pipeline-steps">
          <!-- Steps will be rendered by JS -->
        </div>
      </section>

      <!-- Data Table -->
      <section class="data-section">
        <div class="data-header">
          <h2 class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            Dữ liệu Supabase
          </h2>
          <p class="data-note">Click ô bất kỳ để copy nội dung; click cột image_name để nạp toàn bộ dữ liệu lên form nhập phía trên.</p>
          <button class="btn btn-secondary btn-sm" id="btn-refresh-data">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10" />
              <polyline points="1 20 1 14 7 14" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
            Refresh
          </button>
        </div>
        <div class="data-table-wrapper" id="data-table-wrapper">
          <p class="empty-state">Đang tải dữ liệu từ Supabase...</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
